spring:
  application:
    name: zelo-server
  datasource:
    url: ${ZELO_DB_URL:jdbc:postgresql://localhost:5432/zelo}
    username: ${ZELO_DB_USER:zelo}
    password: ${ZELO_DB_PASSWORD:zelo}
  jpa:
    # Flyway owns the schema; Hibernate only validates entities against it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    scheduling:
      # Three @Scheduled jobs share the scheduler — the 60s DSR overdue sweep, the hourly
      # token purge, and the outbox health check. Give it enough threads that a slow or
      # stuck job can never delay the others. Bump if more background jobs are added.
      pool:
        size: 3
  jackson:
    # The public API uses snake_case (external_id, purpose_key, legal_basis).
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  mail:
    # SMTP transport for verification + password-reset email. Defaults target
    # Resend's relay; the only secret is the API key (spring.mail.password).
    # Provider swap (e.g. Brevo) = override host/port/username, no code change.
    host: ${ZELO_SMTP_HOST:smtp.resend.com}
    port: ${ZELO_SMTP_PORT:465}
    username: ${ZELO_SMTP_USERNAME:resend}
    password: ${ZELO_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${ZELO_PORT:8080}

outbox:
  # The signed-webhook dispatcher. The poller delivers queued events; failures
  # are retried with backoff up to max-attempts, then parked as FAILED.
  poll-interval-ms: ${ZELO_OUTBOX_POLL_MS:5000}
  batch-size: 100
  max-attempts: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
  health:
    mail:
      # Mail is async + fail-closed at signup, not a liveness signal: an unreachable
      # or unconfigured SMTP relay must NOT drag /actuator/health (and the container
      # healthcheck) to DOWN. Without this a bare `docker compose up` or the demo
      # profile (no SMTP password) stays perpetually "unhealthy", so the compose
      # `depends_on: service_healthy` never starts dependents — and in prod a Resend
      # outage would needlessly mark the whole control plane down. It also avoids an
      # SMTP auth round-trip on every health poll.
      enabled: false

zelo:
  dsr:
    # Deadline window for fulfilling a data-subject request, in days. LGPD does
    # not fix a single universal number; Art. 19 §3 sets a 15-day window for
    # access requests, which we adopt as the default SLA for deletion too.
    delete-deadline-days: ${ZELO_DELETE_DEADLINE_DAYS:15}
    overdue-sweep-interval-ms: ${ZELO_OVERDUE_SWEEP_MS:60000}
  outbox:
    # Operator-visibility for the webhook dispatcher (the library handles delivery).
    # health-interval-ms: how often to scan for dead-lettered/stuck events and refresh
    # the zelo.outbox.failed gauge. warn-attempts: WARN once a PENDING event has retried
    # this many times (the integrator endpoint is likely failing).
    health-interval-ms: ${ZELO_OUTBOX_HEALTH_INTERVAL_MS:300000}
    warn-attempts: ${ZELO_OUTBOX_WARN_ATTEMPTS:3}
  bootstrap:
    # When api-key is set, an API key with this raw value is seeded on startup
    # (idempotent). Leave blank in production; provision keys out-of-band.
    api-key: ${ZELO_BOOTSTRAP_API_KEY:}
    name: ${ZELO_BOOTSTRAP_NAME:default}
    webhook-url: ${ZELO_BOOTSTRAP_WEBHOOK_URL:}
    webhook-secret: ${ZELO_BOOTSTRAP_WEBHOOK_SECRET:}
  showcase:
    # Seed + publicly serve a synthetic demo audit chain for the landing page's
    # live proof widget (GET /v1/audit/verify/demo). Synthetic data only — no real
    # personal data — and the endpoint exposes only the integrity verdict + count.
    enabled: ${ZELO_SHOWCASE_ENABLED:true}
  admin:
    # Master key guarding the runtime key-provisioning API (/admin/**). Blank
    # disables the admin API entirely (fail-closed); set a strong value in prod
    # to onboard clients without a redeploy.
    master-key: ${ZELO_ADMIN_MASTER_KEY:}
  auth:
    # Self-service account auth (/account/**). session-secret is the HMAC key for
    # session cookies; blank disables dashboard logins (fail-closed). Onboarding is
    # instant + email-verified (see zelo.mail) — there is no operator to seed.
    session-secret: ${ZELO_AUTH_SECRET:}
    session-ttl-hours: ${ZELO_SESSION_TTL_HOURS:168}
    # Per-account brute-force lockout on /account/login: after this many consecutive
    # failures the account is locked (429) for the window below. Travels with the app
    # (covers self-host); the hosted tier also has an nginx per-IP limit on login.
    login-max-failures: ${ZELO_LOGIN_MAX_FAILURES:10}
    login-lockout-minutes: ${ZELO_LOGIN_LOCKOUT_MINUTES:15}
  mail:
    # Verification + password-reset email. enabled=false uses a logging no-op
    # sender; with require-verification=true that makes signup fail closed (503)
    # rather than activate an unverified account. base-url builds the links in
    # emails (never from the request Host). All blank/off by default; set in prod.
    enabled: ${ZELO_MAIL_ENABLED:false}
    from: ${ZELO_MAIL_FROM:}
    reply-to: ${ZELO_MAIL_REPLY_TO:}
    base-url: ${ZELO_MAIL_BASE_URL:}
    require-verification: ${ZELO_MAIL_REQUIRE_VERIFICATION:true}
    verification-ttl-hours: ${ZELO_MAIL_VERIFICATION_TTL_HOURS:24}
    reset-ttl-minutes: ${ZELO_MAIL_RESET_TTL_MINUTES:30}
    resend-cooldown-seconds: ${ZELO_MAIL_RESEND_COOLDOWN_SECONDS:60}
    daily-emails-per-account: ${ZELO_MAIL_DAILY_EMAILS_PER_ACCOUNT:5}
    # A spent token row is purged once expired AND older than this (floored at 24h
    # so it can't drop a row still counted by the cooldown / daily cap).
    token-retention-hours: ${ZELO_MAIL_TOKEN_RETENTION_HOURS:48}
    token-purge-interval-ms: ${ZELO_MAIL_TOKEN_PURGE_INTERVAL_MS:3600000}
