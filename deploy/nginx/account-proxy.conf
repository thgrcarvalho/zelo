# Zelo account API (PR B) — reverse-proxy the dashboard origin's /account/**
# to the control plane on :8080, so the session cookie works same-origin with
# the /app dashboard (no CORS, HttpOnly cookie never exposed to JS).
#
# PLACEMENT: paste the three location blocks below INSIDE the TLS server block for
#   server_name zelocompliance.com www.zelocompliance.com;
# in /etc/nginx/sites-available/zelo-landing — the same block that already serves
# the landing page, /docs/, and (now) /app. Then `nginx -t` and reload.
#
# Do NOT add these to the api.zelocompliance.com vhost: /account is session-cookie
# auth and must live only on the dashboard origin. /v1 (client key) and /admin
# (master key, localhost-only) stay on the api host, unchanged.
#
# /app itself needs no block — the landing vhost's existing
#   location / { try_files $uri $uri/ =404; }
# serves /var/www/zelocompliance/app/index.html for /app/.
#
# Because proxy_pass has no URI part, nginx forwards the original request URI
# verbatim: /account/login -> http://127.0.0.1:8080/account/login.
#
# ---------------------------------------------------------------------------
# RATE LIMITING — brute-force defense on the unauthenticated auth endpoints.
# The zone MUST be declared in the http{} context (NOT inside server{}): add this
# one line near the top of /etc/nginx/nginx.conf, or in a file under
# /etc/nginx/conf.d/ (which is included at http scope):
#
#     limit_req_zone $binary_remote_addr zone=zelo_auth:10m rate=5r/m;
#
# Then paste the three location blocks below into the server block. The two exact
# (`location =`) matches take priority over the `/account/` prefix, so only login
# and signup are throttled; authenticated traffic is unaffected.
# ---------------------------------------------------------------------------

# Throttle login: ~5/min per client IP, small burst, then 429 (no backend hit).
location = /account/login {
    limit_req zone=zelo_auth burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Same throttle for signup, so the approval queue can't be flooded with accounts.
location = /account/signup {
    limit_req zone=zelo_auth burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Everything else under /account/ (session-authenticated) — proxied, not throttled.
location /account/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
