# Edge rate-limiting + trusted client IP for the api.zelocompliance.com vhost.
#
# Why scoped this narrowly: the only PUBLIC, unauthenticated /v1 path is the landing
# proof widget's GET /v1/audit/verify/demo — that's the DoS target, so it gets a per-IP
# limit_req keyed on the trusted $binary_remote_addr (the in-app @RateLimit keys on
# X-Forwarded-For, which a client can spoof, so nginx is the real backstop). The authed
# /v1/* paths are API-key-gated — a keyless attacker just gets a cheap 401 — so they are
# deliberately NOT broadly throttled, which would risk throttling a legitimate
# high-volume integrator (e.g. Vitalio).
#
# This file is reference + apply instructions; the api vhost itself
# (/etc/nginx/sites-available/zelo) is certbot-managed and edited in place:
#
#   1. Put the limit_req_zone in the http{} context — append to
#      /etc/nginx/conf.d/zelo-ratelimit.conf (alongside the existing zelo_auth zone).
#   2. Add the `location = /v1/audit/verify/demo` block below INSIDE the TLS server
#      block (listen 443), before the catch-all `location /`.
#   3. In the existing catch-all `location / { ... }`, change
#        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#      to
#        proxy_set_header X-Forwarded-For $remote_addr;
#      so the app sees the real client IP (overwrite, not append) and the in-app
#      per-IP limiter can't be spoofed by a client-supplied header.
#   4. sudo nginx -t && sudo systemctl reload nginx

# --- (1) http{} context: /etc/nginx/conf.d/zelo-ratelimit.conf ---
limit_req_zone $binary_remote_addr zone=zelo_demo:10m rate=60r/m;

# --- (2) inside the api vhost TLS server block, before `location /` ---
location = /v1/audit/verify/demo {
    limit_req zone=zelo_demo burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
}
