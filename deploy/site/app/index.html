<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Zelo — Dashboard</title>
<meta name="description" content="Zelo developer dashboard: create an account, verify your email, and self-issue API keys to integrate the LGPD compliance control plane.">
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0B0A12">
<style>
  /* ===== Zelo dashboard — "append-only" identity ===== */
  @font-face{font-family:'Space Grotesk';font-weight:500;font-display:swap;src:url('/assets/fonts/space-grotesk-500.woff2') format('woff2')}
  @font-face{font-family:'Space Grotesk';font-weight:600;font-display:swap;src:url('/assets/fonts/space-grotesk-600.woff2') format('woff2')}
  @font-face{font-family:'Space Grotesk';font-weight:700;font-display:swap;src:url('/assets/fonts/space-grotesk-700.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Sans';font-weight:400;font-display:swap;src:url('/assets/fonts/ibm-plex-sans-400.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Sans';font-weight:500;font-display:swap;src:url('/assets/fonts/ibm-plex-sans-500.woff2') format('woff2')}
  @font-face{font-family:'IBM Plex Sans';font-weight:600;font-display:swap;src:url('/assets/fonts/ibm-plex-sans-600.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-weight:400;font-display:swap;src:url('/assets/fonts/jetbrains-mono-400.woff2') format('woff2')}
  @font-face{font-family:'JetBrains Mono';font-weight:500;font-display:swap;src:url('/assets/fonts/jetbrains-mono-500.woff2') format('woff2')}

  :root{
    --bg:#0B0A12; --bg-2:#08070E; --surface:#14131F; --surface-2:#100F1A; --elevated:#1B1930;
    --border:#2A2740; --border-soft:#201E30;
    --ink:#ECEAF6; --muted:#9A93B0; --faint:#8C85A1;
    --violet:#8B6CFF; --violet-bright:#9D86FF; --violet-deep:#7857F5; --violet-tint:rgba(139,108,255,.13); --on-violet:#0B0814;
    --cyan:#4FD8E6; --success:#34D399; --warn:#F5B544; --danger:#FB7185;
    --font-display:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
    --font-sans:'IBM Plex Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --wide:1080px;
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:rgba(139,108,255,.32);color:#fff}
  a{color:var(--violet-bright);text-decoration:none}
  a:hover{color:var(--cyan);text-decoration:none}
  :focus-visible{outline:2px solid var(--violet);outline-offset:2px;border-radius:4px}
  h1,h2,h3{font-family:var(--font-display);letter-spacing:-.02em}
  strong{color:var(--ink);font-weight:600}

  .wrap{width:100%;max-width:var(--wide);margin:0 auto;padding:0 22px}

  /* logo */
  .wordmark{display:inline-flex;align-items:center;gap:10px;color:var(--ink);font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.03em;line-height:1}
  .wordmark:hover{color:var(--ink);text-decoration:none}
  .zmark{flex:none;display:block}
  .zmark .rail{stroke:currentColor}

  /* nav */
  .nav{position:sticky;top:0;z-index:100;background:rgba(11,10,18,.78);backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid var(--border-soft)}
  .nav-inner{max-width:var(--wide);margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:16px}
  .nav-links{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .nav-links a,.nav-links button.linkish{color:var(--muted);font-size:14.5px;padding:7px 11px;border-radius:8px;background:none;border:none;cursor:pointer;font-family:inherit;transition:.16s}
  .nav-links a:hover,.nav-links button.linkish:hover{color:var(--ink);text-decoration:none;background:var(--elevated)}
  .nav-who{font-size:13.5px;color:var(--muted);font-family:var(--font-mono)}

  /* layout */
  .page{padding:48px 0 0}
  h1.title{font-size:clamp(27px,4vw,35px);line-height:1.08;letter-spacing:-.025em;font-weight:700;margin:0 0 10px}
  .lead{color:var(--muted);margin:0 0 26px;max-width:640px}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);font-family:var(--font-mono);border:1px solid var(--border);background:var(--surface);padding:6px 13px;border-radius:999px;margin-bottom:18px;letter-spacing:.02em}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin:18px 0}
  .card.tight{padding:18px}
  .card h2{font-size:19px;letter-spacing:-.01em;margin:0 0 4px}
  .card h3{font-size:15px;font-family:var(--font-mono);color:var(--ink);margin:0 0 12px;font-weight:600}
  .card .sub{color:var(--muted);font-size:14px;margin:0 0 16px}
  .auth-card{max-width:440px}
  .card.narrow{max-width:560px}

  /* forms */
  .field{margin:0 0 15px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin:0 0 7px;font-family:var(--font-mono)}
  input[type=text],input[type=email],input[type=password]{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;color:var(--ink);font-family:var(--font-sans);font-size:15px;padding:12px 14px;transition:.16s}
  input::placeholder{color:#857E9C}
  input:focus{border-color:var(--violet);outline:none;box-shadow:0 0 0 3px rgba(139,108,255,.32)}
  .hint{font-size:12.5px;color:var(--faint);margin:6px 0 0}
  .linklike{background:none;border:none;color:var(--violet-bright);font-family:inherit;font-size:13.5px;cursor:pointer;padding:0;margin-top:12px}
  .linklike:hover{color:var(--cyan);text-decoration:underline}

  /* buttons */
  .btn{font-family:var(--font-sans);font-size:15px;font-weight:600;border:1px solid transparent;cursor:pointer;border-radius:11px;padding:12px 18px;background:var(--violet);color:var(--on-violet);display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:background .16s,transform .05s}
  .btn:hover{background:var(--violet-bright)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--border)}
  .btn-ghost:hover{background:var(--elevated);border-color:var(--violet)}
  .btn-sm{font-size:13px;padding:8px 13px;border-radius:8px}
  .btn-danger{background:transparent;color:var(--danger);border-color:rgba(251,113,133,.42)}
  .btn-danger:hover{background:rgba(251,113,133,.12)}
  .btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:4px}

  /* segmented toggle */
  .toggle{display:inline-flex;gap:4px;border:1px solid var(--border);border-radius:11px;padding:4px;margin-bottom:20px;background:var(--surface-2)}
  .toggle button{background:transparent;color:var(--muted);border:none;padding:12px 22px;min-height:46px;border-radius:8px;font-family:var(--font-sans);font-size:14px;font-weight:500;cursor:pointer;transition:.16s}
  .toggle button:hover{color:var(--ink)}
  .toggle button.on{background:var(--violet);color:var(--on-violet);font-weight:600}
  .toggle button.on:hover{color:var(--on-violet)}

  /* table */
  .tbl-wrap{overflow-x:auto}
  table.tbl{width:100%;border-collapse:collapse;font-size:14px}
  table.tbl th,table.tbl td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border-soft);vertical-align:top}
  table.tbl th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;font-family:var(--font-mono)}
  table.tbl td{color:var(--ink)}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl .mono{font-family:var(--font-mono);font-size:13px;color:var(--muted)}
  .empty{color:var(--muted);font-size:14px;padding:14px 2px}

  /* badges */
  .badge{font-family:var(--font-mono);font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--border);color:var(--muted);background:var(--surface-2);display:inline-block;letter-spacing:.02em}
  .badge.ok{color:var(--success);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.1)}
  .badge.warn{color:var(--warn);border-color:rgba(245,181,68,.4);background:rgba(245,181,68,.1)}
  .badge.off{color:var(--muted)}

  /* key reveal — the dashboard's hero moment (cyan = proof/verified) */
  .reveal{position:relative;border:1px solid rgba(79,216,230,.4);border-left:3px solid var(--cyan);
    background:linear-gradient(180deg,rgba(79,216,230,.09),var(--violet-tint));border-radius:13px;padding:20px;margin:16px 0;
    box-shadow:0 0 0 1px rgba(79,216,230,.06),0 24px 60px -28px rgba(79,216,230,.45)}
  .reveal .co-title{font-family:var(--font-display);font-weight:600;color:var(--ink);margin-bottom:13px;display:flex;align-items:center;gap:9px;font-size:15.5px}
  .reveal .co-title::before{content:"✓";display:inline-grid;place-items:center;width:21px;height:21px;border-radius:50%;background:var(--cyan);color:#06222a;font-size:12px;font-weight:800;flex:none}
  .reveal .keybox{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .reveal code{font-family:var(--font-mono);font-size:13.5px;background:var(--bg);border:1px solid rgba(79,216,230,.32);border-radius:9px;padding:13px 14px;color:var(--cyan);word-break:break-all;flex:1;min-width:240px;letter-spacing:.01em}
  .reveal .keybox .btn{min-height:44px}
  .reveal .btn.copied{background:var(--cyan);color:#06222a}
  .reveal .warn-line{color:var(--warn);font-size:13px;margin:12px 0 0;display:flex;gap:7px;align-items:flex-start}
  .reveal .warn-line::before{content:"⚠";flex:none}

  /* callout / flash */
  .callout{border:1px solid var(--border);border-left:3px solid var(--violet);background:var(--surface);border-radius:11px;padding:14px 16px;margin:18px 0;font-size:14.5px;color:var(--muted)}
  .callout.warn{border-left-color:var(--warn)}
  .callout strong{color:var(--ink)}
  #flash{position:fixed;right:18px;bottom:18px;z-index:200;display:flex;flex-direction:column;gap:10px;max-width:360px}
  .toast{background:var(--elevated);border:1px solid var(--border);border-left:3px solid var(--violet);border-radius:11px;padding:12px 15px;font-size:14px;color:var(--ink);box-shadow:0 18px 50px -12px rgba(0,0,0,.6)}
  .toast.err{border-left-color:var(--danger)}

  .row-actions{display:flex;gap:8px;flex-wrap:wrap}
  .inline-form{margin-top:12px;padding:16px;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:11px}
  .inline-form .field{margin-bottom:11px}
  .muted{color:var(--muted)}
  .sub{color:var(--muted)}
  details.wh{margin:0 0 15px}
  details.wh > summary{cursor:pointer;color:var(--muted);font-size:13.5px;font-family:var(--font-sans);list-style-position:inside}
  details.wh > summary:hover{color:var(--ink)}

  /* footer */
  footer{padding:44px 0 64px;color:var(--muted);font-size:14px;border-top:1px solid var(--border-soft);margin-top:64px}
  footer .foot-grid{display:flex;flex-wrap:wrap;gap:14px 26px;align-items:center}
  footer a{color:var(--muted)}footer a:hover{color:var(--ink)}
  .foot-note{margin-top:16px;font-family:var(--font-mono);font-size:12.5px;color:var(--muted)}
  .foot-note b{color:var(--cyan);font-weight:500}

  /* ---------- mobile (QA: reflow keys table to cards, fix nav) ---------- */
  @media (max-width:680px){
    .nav-inner{padding:11px 16px;gap:8px 12px;flex-wrap:wrap}
    .nav-links{gap:4px 6px;width:100%;margin-left:0}
    .nav-who{margin-left:auto;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .page{padding:34px 0 0}
    h1.title{font-size:27px}
    .card{padding:18px}
    /* keys table -> one card per key */
    table.tbl, table.tbl tbody, table.tbl tr, table.tbl td{display:block;width:100%}
    table.tbl thead{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
    table.tbl tr{border:1px solid var(--border);border-radius:11px;padding:4px 14px;margin:0 0 12px;background:var(--surface-2)}
    table.tbl td{border-bottom:1px solid var(--border-soft);padding:11px 0;display:flex;justify-content:space-between;align-items:center;gap:14px;text-align:right;min-height:0}
    table.tbl tr td:last-child{border-bottom:none}
    table.tbl td::before{content:attr(data-label);color:var(--muted);font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;text-align:left;flex:none;align-self:center}
    table.tbl td .mono{text-align:right;word-break:break-all}
    table.tbl td.actions-cell{padding-top:12px}
    table.tbl td.actions-cell::before{display:none}
    .row-actions{width:100%;justify-content:flex-end}
    .row-actions .btn{flex:1;min-height:42px}
  }

</style>
</head>
<body>

<nav class="nav" aria-label="Primary">
  <div class="nav-inner">
    <a class="wordmark" href="/"><svg class="zmark" width="24" height="24" viewBox="0 0 32 32" fill="none" aria-hidden="true"><line class="rail" x1="6.7" y1="8" x2="25.3" y2="8" stroke-width="6.6" stroke-linecap="round"/><line x1="25.3" y1="8" x2="6.7" y2="24" stroke="#8B6CFF" stroke-width="6.6" stroke-linecap="round"/><line class="rail" x1="6.7" y1="24" x2="25.3" y2="24" stroke-width="6.6" stroke-linecap="round"/></svg>Zelo</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/docs/">Docs</a>
      <a href="https://github.com/thgrcarvalho/zelo" rel="noopener">GitHub</a>
      <span id="nav-account"></span>
    </div>
  </div>
</nav>

<main class="page">
  <div class="wrap">
    <div id="app" aria-live="polite">
      <div class="card"><p class="muted">Loading…</p></div>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-grid">
      <a class="wordmark" href="/" style="font-size:17px;"><svg class="zmark" width="21" height="21" viewBox="0 0 32 32" fill="none" aria-hidden="true"><line class="rail" x1="6.7" y1="8" x2="25.3" y2="8" stroke-width="6.6" stroke-linecap="round"/><line x1="25.3" y1="8" x2="6.7" y2="24" stroke="#8B6CFF" stroke-width="6.6" stroke-linecap="round"/><line class="rail" x1="6.7" y1="24" x2="25.3" y2="24" stroke-width="6.6" stroke-linecap="round"/></svg>Zelo</a>
      <span>Open source · Apache-2.0</span>
      <a href="https://github.com/thgrcarvalho/zelo" rel="noopener">github.com/thgrcarvalho/zelo</a>
      <a href="/docs/">Docs</a>
    </div>
    <p class="foot-note">Zelo is a control plane that stores zero end-user PII. Your account email is B2B contact data — a separate category.</p>
  </div>
</footer>

<div id="flash" aria-live="assertive"></div>

<script>
"use strict";
(function () {
  var app = document.getElementById("app");
  var navAccount = document.getElementById("nav-account");
  var flash = document.getElementById("flash");
  var me = null;

  // --- helpers ---------------------------------------------------------------

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function toast(message, isError) {
    var t = document.createElement("div");
    t.className = "toast" + (isError ? " err" : "");
    t.textContent = message;
    flash.appendChild(t);
    setTimeout(function () { t.remove(); }, isError ? 6000 : 3500);
  }

  // All calls are same-origin to /account/**; credentials:include sends the
  // session cookie; the JSON content-type is part of the CSRF posture.
  function api(path, opts) {
    opts = opts || {};
    var init = { method: opts.method || "GET", credentials: "include", headers: {} };
    if (opts.body !== undefined && opts.body !== null) {
      init.headers["Content-Type"] = "application/json";
      init.body = JSON.stringify(opts.body);
    }
    return fetch("/account" + path, init).then(function (res) {
      if (res.status === 204) return null;
      return res.json().catch(function () { return null; }).then(function (data) {
        if (!res.ok) {
          var msg = (data && data.message) ? data.message : ("Request failed (" + res.status + ")");
          var err = new Error(msg);
          err.status = res.status;
          // Self-heal on a lost/expired session: drop to the login view so no
          // authenticated screen lingers after the session is gone. Mark it handled
          // so the caller's .catch doesn't also toast a confusing 401 error.
          if (res.status === 401 && me !== null) { me = null; render(); err.handled = true; }
          throw err;
        }
        return data;
      });
    });
  }

  function fail(err) {
    // A handled 401 already self-healed to the login view — don't also toast it.
    if (err && err.handled) return;
    toast(err && err.message ? err.message : "Something went wrong", true);
  }

  function statusBadge(status) {
    if (status === "ACTIVE") return '<span class="badge ok">ACTIVE</span>';
    if (status === "UNVERIFIED") return '<span class="badge warn">UNVERIFIED</span>';
    return '<span class="badge">' + esc(status) + "</span>";
  }

  // --- top-level state machine ------------------------------------------------

  function refresh() {
    return api("/me")
      .then(function (data) { me = data; render(); })
      .catch(function (err) {
        // A 401 means "not logged in" — show the login view. Anything else
        // (network, 5xx) must still render something, not leave "Loading…" stuck.
        me = null;
        if (err.status === 401) { render(); } else { renderError(err); }
      });
  }

  function render() {
    renderNav();
    if (!me) return renderAuth();
    if (me.status === "UNVERIFIED") return renderUnverified();
    return renderActive();
  }

  function renderError(err) {
    renderNav();
    var msg = (err && err.message) ? err.message : "Couldn't reach the server";
    app.innerHTML =
      '<div class="card narrow"><h2>Something went wrong</h2>' +
      '<p class="muted">' + esc(msg) + "</p>" +
      '<div class="btn-row"><button class="btn" id="retry">Retry</button></div></div>';
    document.getElementById("retry").addEventListener("click", function () {
      app.innerHTML = '<div class="card"><p class="muted">Loading…</p></div>';
      refresh();
    });
  }

  function renderNav() {
    if (!me) { navAccount.innerHTML = ""; return; }
    navAccount.innerHTML =
      '<span class="nav-who">' + esc(me.email) + "</span>" +
      '<button class="linkish" id="logout">Log out</button>';
    document.getElementById("logout").addEventListener("click", function () {
      // Always drop to the logged-out view, even if the server call fails — a UI
      // that still looks authenticated after a logout click is worse than a missed
      // server-side cookie clear.
      api("/logout", { method: "POST" }).catch(function () {}).then(function () {
        me = null; render(); toast("Logged out");
      });
    });
  }

  // --- logged out: signup / login --------------------------------------------

  function renderAuth() {
    app.innerHTML =
      '<span class="eyebrow">Developer access</span>' +
      '<h1 class="title">Your Zelo dashboard</h1>' +
      '<p class="lead">Create an account to self-issue API keys for the LGPD compliance control plane. ' +
      "Verify your email and you can issue keys right away — no waiting on approval.</p>" +
      '<div class="card auth-card">' +
        '<div class="toggle" role="tablist">' +
          '<button id="tab-login" class="on">Log in</button>' +
          '<button id="tab-signup">Sign up</button>' +
        "</div>" +
        '<div id="auth-body"></div>' +
      "</div>";

    var showing = "login";
    function paint() {
      document.getElementById("tab-login").className = showing === "login" ? "on" : "";
      document.getElementById("tab-signup").className = showing === "signup" ? "on" : "";
      document.getElementById("auth-body").innerHTML = showing === "login" ? loginForm() : signupForm();
      if (showing === "login") wireLogin(); else wireSignup();
    }
    document.getElementById("tab-login").addEventListener("click", function () { showing = "login"; paint(); });
    document.getElementById("tab-signup").addEventListener("click", function () { showing = "signup"; paint(); });
    paint();
  }

  function loginForm() {
    return (
      '<div class="field"><label for="li-email">Email</label>' +
      '<input id="li-email" type="email" autocomplete="email"></div>' +
      '<div class="field"><label for="li-pass">Password</label>' +
      '<input id="li-pass" type="password" autocomplete="current-password"></div>' +
      '<button class="btn" id="li-submit">Log in</button>' +
      '<div><button class="linklike" id="li-forgot">Forgot password?</button></div>'
    );
  }

  function wireLogin() {
    document.getElementById("li-submit").addEventListener("click", function () {
      var btn = this;
      btn.disabled = true;
      api("/login", { method: "POST", body: {
        email: document.getElementById("li-email").value.trim(),
        password: document.getElementById("li-pass").value
      } }).then(function (data) {
        me = data; render(); toast("Welcome back");
      }).catch(function (err) { fail(err); btn.disabled = false; });
    });
    document.getElementById("li-forgot").addEventListener("click", renderForgotPassword);
  }

  function signupForm() {
    return (
      '<div class="field"><label for="su-email">Email</label>' +
      '<input id="su-email" type="email" autocomplete="email"></div>' +
      '<div class="field"><label for="su-org">Organization</label>' +
      '<input id="su-org" type="text" autocomplete="organization"></div>' +
      '<div class="field"><label for="su-pass">Password</label>' +
      '<input id="su-pass" type="password" autocomplete="new-password">' +
      '<p class="hint">At least 8 characters.</p></div>' +
      '<button class="btn" id="su-submit">Create account</button>' +
      '<p class="hint" style="margin-top:10px;">By creating an account you agree to the ' +
        '<a href="/legal/termos.html" target="_blank" rel="noopener">Terms</a>, ' +
        '<a href="/legal/privacidade.html" target="_blank" rel="noopener">Privacy Policy</a> and ' +
        '<a href="/legal/dpa.html" target="_blank" rel="noopener">DPA</a>.</p>' +
      '<p class="hint" style="margin-top:12px;">We store your email and org as B2B contact data — never end-user PII.</p>'
    );
  }

  function wireSignup() {
    document.getElementById("su-submit").addEventListener("click", function () {
      var btn = this;
      var email = document.getElementById("su-email").value.trim();
      var pass = document.getElementById("su-pass").value;
      if (pass.length < 8) { toast("Password must be at least 8 characters", true); return; }
      btn.disabled = true;
      api("/signup", { method: "POST", body: {
        email: email,
        org_name: document.getElementById("su-org").value.trim(),
        password: pass
      } }).then(function () {
        renderCheckEmail(email);
      }).catch(function (err) { fail(err); btn.disabled = false; });
    });
  }

  // --- email verification: check-inbox / resend / landing --------------------

  function renderCheckEmail(email) {
    me = null;
    renderNav();
    app.innerHTML =
      '<span class="eyebrow">Almost there</span>' +
      '<h1 class="title">Check your email</h1>' +
      '<div class="card narrow">' +
        "<p>If <strong>" + esc(email) + "</strong> can be registered, we've sent it a link to " +
        "verify your address and finish signing up.</p>" +
        '<p class="muted">The link opens this dashboard and activates your account. ' +
        "Didn't get it? Check spam, or sign in to resend.</p>" +
        '<div class="btn-row"><button class="btn btn-ghost" id="back-signin">Back to sign in</button></div>' +
      "</div>";
    document.getElementById("back-signin").addEventListener("click", function () { render(); });
  }

  function renderUnverified() {
    app.innerHTML =
      '<span class="eyebrow">Account status</span>' +
      '<h1 class="title">Verify your email</h1>' +
      '<div class="card narrow">' +
        "<p>Your account <strong>" + esc(me.email) + "</strong> (" + esc(me.org_name) + ") is " +
        statusBadge("UNVERIFIED") + ".</p>" +
        '<p class="muted">We emailed a verification link to <strong>' + esc(me.email) + "</strong>. " +
        "Click it to activate your account and start issuing API keys.</p>" +
        '<div class="btn-row"><button class="btn" id="resend">Resend email</button></div>' +
      "</div>";
    document.getElementById("resend").addEventListener("click", function () {
      var btn = this;
      btn.disabled = true;
      api("/verify-email/resend", { method: "POST" }).then(function () {
        toast("If your address still needs verifying, we've sent a fresh link.");
      }).catch(function (err) { fail(err); }).then(function () {
        setTimeout(function () { btn.disabled = false; }, 2000);
      });
    });
  }

  // Landing for the emailed verify link (#verify=<token>). The token is consumed
  // only on an explicit click — never auto-POSTed — so an email scanner that
  // prefetches the link can't silently burn the one-time token.
  function renderVerifyLanding(token) {
    me = null;
    renderNav();
    app.innerHTML =
      '<span class="eyebrow">Verify email</span>' +
      '<h1 class="title">Confirm your email</h1>' +
      '<div class="card narrow">' +
        "<p>Click below to verify your email address and activate your Zelo account.</p>" +
        '<div class="btn-row"><button class="btn" id="verify-go">Verify my email</button></div>' +
      "</div>";
    document.getElementById("verify-go").addEventListener("click", function () {
      var btn = this;
      btn.disabled = true;
      api("/verify-email", { method: "POST", body: { token: token } }).then(function (data) {
        me = data; render(); toast("Email verified — welcome to Zelo!");
      }).catch(function () {
        app.innerHTML =
          '<span class="eyebrow">Verify email</span>' +
          '<h1 class="title">Link invalid or expired</h1>' +
          '<div class="card narrow"><p class="muted">This verification link is invalid, already used, or expired. ' +
          "Sign in and resend a fresh one.</p>" +
          '<div class="btn-row"><button class="btn" id="to-signin">Go to sign in</button></div></div>';
        document.getElementById("to-signin").addEventListener("click", function () { render(); });
      });
    });
  }

  // --- password reset: request / landing -------------------------------------

  function renderForgotPassword() {
    me = null;
    renderNav();
    app.innerHTML =
      '<span class="eyebrow">Password reset</span>' +
      '<h1 class="title">Reset your password</h1>' +
      '<div class="card auth-card">' +
        '<div class="field"><label for="fp-email">Email</label>' +
        '<input id="fp-email" type="email" autocomplete="email"></div>' +
        '<button class="btn" id="fp-submit">Send reset link</button>' +
        '<div><button class="linklike" id="fp-back">Back to sign in</button></div>' +
      "</div>";
    document.getElementById("fp-back").addEventListener("click", function () { render(); });
    document.getElementById("fp-submit").addEventListener("click", function () {
      var btn = this;
      btn.disabled = true;
      api("/password-reset/request", { method: "POST", body: {
        email: document.getElementById("fp-email").value.trim()
      } }).then(function () {
        app.innerHTML =
          '<span class="eyebrow">Password reset</span>' +
          '<h1 class="title">Check your email</h1>' +
          '<div class="card"><p>If an account exists for that address, we\'ve sent a link to reset ' +
          "your password. The link opens here.</p>" +
          '<div class="btn-row"><button class="btn btn-ghost" id="fp-done">Back to sign in</button></div></div>';
        document.getElementById("fp-done").addEventListener("click", function () { render(); });
      }).catch(function (err) { fail(err); btn.disabled = false; });
    });
  }

  // Landing for the emailed reset link (#reset=<token>).
  function renderResetPassword(token) {
    me = null;
    renderNav();
    app.innerHTML =
      '<span class="eyebrow">Password reset</span>' +
      '<h1 class="title">Choose a new password</h1>' +
      '<div class="card auth-card">' +
        '<div class="field"><label for="rp-pass">New password</label>' +
        '<input id="rp-pass" type="password" autocomplete="new-password">' +
        '<p class="hint">At least 8 characters.</p></div>' +
        '<div class="field"><label for="rp-confirm">Confirm password</label>' +
        '<input id="rp-confirm" type="password" autocomplete="new-password"></div>' +
        '<button class="btn" id="rp-submit">Set new password</button>' +
      "</div>";
    document.getElementById("rp-submit").addEventListener("click", function () {
      var btn = this;
      var pass = document.getElementById("rp-pass").value;
      var confirm = document.getElementById("rp-confirm").value;
      if (pass.length < 8) { toast("Password must be at least 8 characters", true); return; }
      if (pass !== confirm) { toast("Passwords don't match", true); return; }
      btn.disabled = true;
      api("/password-reset/confirm", { method: "POST", body: { token: token, password: pass } }).then(function () {
        me = null; render();
        toast("Password updated — please log in.");
      }).catch(function () {
        app.innerHTML =
          '<span class="eyebrow">Password reset</span>' +
          '<h1 class="title">Link invalid or expired</h1>' +
          '<div class="card narrow"><p class="muted">This reset link is invalid, already used, or expired. ' +
          "Request a fresh one from the sign-in page.</p>" +
          '<div class="btn-row"><button class="btn" id="rp-restart">Back to sign in</button></div></div>';
        document.getElementById("rp-restart").addEventListener("click", function () { render(); });
      });
    });
  }

  // --- active: keys -----------------------------------------------------------

  function renderActive() {
    app.innerHTML =
      '<span class="eyebrow">Dashboard</span>' +
      '<h1 class="title">API keys</h1>' +
      '<p class="lead">Issue keys for <strong>' + esc(me.org_name) + "</strong>, point them at your webhook, " +
      'and revoke them when you rotate. New here? Start with the <a href="/docs/">integration guide</a>.</p>' +
      '<div class="card">' +
        "<h2>Create a key</h2>" +
        '<p class="sub">The raw key is shown once, at creation. Store it immediately — it is never displayed again.</p>' +
        '<div id="create-host"></div>' +
        createForm() +
      "</div>" +
      '<div class="card">' +
        "<h2>Your keys</h2>" +
        '<div id="keys" class="tbl-wrap"><p class="empty">Loading keys…</p></div>' +
      "</div>";

    wireCreateForm();
    loadKeys();
  }

  function createForm() {
    return (
      '<div class="field"><label for="ck-name">Name</label>' +
      '<input id="ck-name" type="text" placeholder="e.g. production"></div>' +
      '<details class="wh"><summary>Webhook (optional — can be set later)</summary>' +
        '<div class="inline-form">' +
          '<div class="field"><label for="ck-wurl">Webhook URL</label>' +
          '<input id="ck-wurl" type="text" placeholder="https://app.example.com/zelo/webhooks"></div>' +
          '<div class="field"><label for="ck-wsec">Webhook secret</label>' +
          '<input id="ck-wsec" type="password" autocomplete="off" placeholder="whsec_…"></div>' +
          '<p class="hint">Provide both or neither — a webhook without a secret would deliver unsigned callbacks.</p>' +
        "</div>" +
      "</details>" +
      '<div class="btn-row"><button class="btn" id="ck-submit">Create key</button></div>'
    );
  }

  function wireCreateForm() {
    document.getElementById("ck-submit").addEventListener("click", function () {
      var btn = this;
      var name = document.getElementById("ck-name").value.trim();
      var url = document.getElementById("ck-wurl").value.trim();
      var sec = document.getElementById("ck-wsec").value.trim();
      if (!name) { toast("Give the key a name", true); return; }
      if ((url && !sec) || (sec && !url)) { toast("Provide both webhook URL and secret, or neither", true); return; }
      var body = { name: name };
      if (url) { body.webhook_url = url; body.webhook_secret = sec; }
      btn.disabled = true;
      api("/api-keys", { method: "POST", body: body }).then(function (created) {
        revealKey(created);
        document.getElementById("ck-name").value = "";
        document.getElementById("ck-wurl").value = "";
        document.getElementById("ck-wsec").value = "";
        btn.disabled = false;
        loadKeys();
      }).catch(function (err) { fail(err); btn.disabled = false; });
    });
  }

  function revealKey(created) {
    var host = document.getElementById("create-host");
    host.innerHTML =
      '<div class="reveal">' +
        '<span class="co-title">Key “' + esc(created.name) + '” created — copy it now</span>' +
        '<div class="keybox"><code id="raw-key">' + esc(created.api_key) + "</code>" +
        '<button class="btn btn-sm" id="copy-key">Copy</button></div>' +
        '<p class="warn-line">This is the only time the key is shown. If you lose it, revoke it and create another.</p>' +
      "</div>";
    document.getElementById("copy-key").addEventListener("click", function () {
      var text = created.api_key;
      var done = function () {
        var b = document.getElementById("copy-key");
        if (b) { b.textContent = "Copied ✓"; b.classList.add("copied"); }
        toast("Key copied");
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(function () { selectRawKey(); });
      } else { selectRawKey(); }
    });
  }

  function selectRawKey() {
    var node = document.getElementById("raw-key");
    var range = document.createRange();
    range.selectNodeContents(node);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    toast("Select and copy the highlighted key");
  }

  /** Remove a previously-revealed raw key from the DOM (called on later actions). */
  function clearReveal() {
    var host = document.getElementById("create-host");
    if (host) host.innerHTML = "";
  }

  function loadKeys() {
    return api("/api-keys").then(function (keys) {
      var host = document.getElementById("keys");
      if (!keys || keys.length === 0) {
        host.innerHTML = '<p class="empty">No keys yet. Create one above.</p>';
        return;
      }
      var rows = keys.map(keyRow).join("");
      host.innerHTML =
        '<table class="tbl"><thead><tr>' +
        "<th>Name</th><th>Tier</th><th>Webhook</th><th>Created</th><th>Status</th><th></th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table>" +
        '<div id="key-forms"></div>';
      keys.forEach(wireKeyRow);
    }).catch(function (err) {
      var host = document.getElementById("keys");
      if (host) host.innerHTML = '<p class="empty">Could not load keys.</p>';
      fail(err);
    });
  }

  function keyRow(k) {
    var webhook = k.webhook_url ? '<span class="mono">' + esc(k.webhook_url) + "</span>" : '<span class="muted">—</span>';
    var status = k.revoked ? '<span class="badge off">revoked</span>' : '<span class="badge ok">active</span>';
    var actions = k.revoked ? "" :
      '<div class="row-actions">' +
        '<button class="btn btn-ghost btn-sm" data-wh="' + esc(k.id) + '">Webhook</button>' +
        '<button class="btn btn-danger btn-sm" data-revoke="' + esc(k.id) + '" data-name="' + esc(k.name) + '">Revoke</button>' +
      "</div>";
    return "<tr>" +
      '<td data-label="Name">' + esc(k.name) + "</td>" +
      '<td data-label="Tier">' + (k.tier ? '<span class="badge">' + esc(k.tier) + "</span>" : '<span class="muted">—</span>') + "</td>" +
      '<td data-label="Webhook">' + webhook + "</td>" +
      '<td class="mono" data-label="Created">' + esc((k.created_at || "").slice(0, 10)) + "</td>" +
      '<td data-label="Status">' + status + "</td>" +
      '<td class="actions-cell">' + actions + "</td>" +
      "</tr>";
  }

  function wireKeyRow(k) {
    if (k.revoked) return;
    var whBtn = document.querySelector('[data-wh="' + k.id + '"]');
    if (whBtn) {
      whBtn.addEventListener("click", function () { toggleWebhookForm(k); });
    }
    var revBtn = document.querySelector('[data-revoke="' + k.id + '"]');
    if (revBtn) {
      revBtn.addEventListener("click", function () {
        if (!window.confirm('Revoke key "' + k.name + '"? It stops working immediately.')) return;
        var btn = this;
        btn.disabled = true;
        api("/api-keys/" + k.id, { method: "DELETE" }).then(function () {
          clearReveal();  // a stale just-revealed key must not linger after other actions
          toast("Key revoked"); loadKeys();
        }).catch(function (err) { fail(err); btn.disabled = false; });
      });
    }
  }

  function toggleWebhookForm(k) {
    var host = document.getElementById("key-forms");
    if (host.getAttribute("data-for") === k.id) { host.innerHTML = ""; host.removeAttribute("data-for"); return; }
    host.setAttribute("data-for", k.id);
    host.innerHTML =
      '<div class="inline-form">' +
        "<h3>Set webhook for “" + esc(k.name) + "”</h3>" +
        '<div class="field"><label for="wf-url">Webhook URL</label>' +
        '<input id="wf-url" type="text" value="' + esc(k.webhook_url || "") + '" placeholder="https://app.example.com/zelo/webhooks"></div>' +
        '<div class="field"><label for="wf-sec">Webhook secret</label>' +
        '<input id="wf-sec" type="password" autocomplete="off" placeholder="whsec_…"></div>' +
        '<div class="btn-row"><button class="btn btn-sm" id="wf-save">Save webhook</button>' +
        '<button class="btn btn-ghost btn-sm" id="wf-cancel">Cancel</button></div>' +
        '<p class="hint">Both fields are required. The secret is write-only — it is never shown back.</p>' +
      "</div>";
    document.getElementById("wf-cancel").addEventListener("click", function () {
      host.innerHTML = ""; host.removeAttribute("data-for");
    });
    document.getElementById("wf-save").addEventListener("click", function () {
      var url = document.getElementById("wf-url").value.trim();
      var sec = document.getElementById("wf-sec").value.trim();
      if (!url || !sec) { toast("Webhook URL and secret are both required", true); return; }
      var btn = this;
      btn.disabled = true;
      api("/api-keys/" + k.id + "/webhook", { method: "PATCH", body: { webhook_url: url, webhook_secret: sec } })
        .then(function () {
          clearReveal();
          toast("Webhook updated"); host.innerHTML = ""; host.removeAttribute("data-for"); loadKeys();
        })
        .catch(function (err) { fail(err); btn.disabled = false; });
    });
  }

  // --- boot -------------------------------------------------------------------

  // The verify/reset emails point at /app/#verify=<token> or /app/#reset=<token>.
  // A URL fragment never reaches the server (not in nginx logs, not in Referer).
  // Read it, strip it from the address bar/history at once, then route.
  function boot() {
    var m = (location.hash || "").match(/^#(verify|reset)=(.+)$/);
    if (m) {
      var kind = m[1];
      var token = decodeURIComponent(m[2]);
      history.replaceState(null, "", location.pathname + location.search);
      if (kind === "verify") { renderVerifyLanding(token); return; }
      if (kind === "reset") { renderResetPassword(token); return; }
    }
    refresh();
  }

  boot();
})();
</script>
</body>
</html>
