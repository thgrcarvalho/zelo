name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + unit tests
        run: ./gradlew build

      # ubuntu-latest ships Docker, so the Testcontainers integration tests run here.
      - name: Integration tests
        run: ./gradlew test -DrunIntegrationTests=true
